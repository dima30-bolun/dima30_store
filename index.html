<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube — реальный API + устойчивый плеер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #f9f9f9; }
        .header { position: sticky; top: 0; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 56px; border-bottom: 1px solid #e5e5e5; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 18px; }
        .menu-icon, .logo-icon { cursor: pointer; font-size: 24px; color: #0f0f0f; }
        .logo-icon i { color: #ff0000; }
        .header-center { flex: 1; max-width: 600px; margin: 0 20px; }
        .search-form { display: flex; width: 100%; }
        .search-input { flex: 1; padding: 0 12px; height: 40px; border: 1px solid #ccc; border-radius: 40px 0 0 40px; outline: none; font-size: 16px; }
        .search-btn { background: #f0f0f0; border: 1px solid #ccc; border-left: none; border-radius: 0 40px 40px 0; padding: 0 20px; cursor: pointer; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .icon-btn, .avatar { cursor: pointer; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: #6b6b6b; display: flex; align-items: center; justify-content: center; color: white; }
        .app-container { display: flex; min-height: calc(100vh - 56px); }
        .sidebar { width: 240px; background: white; border-right: 1px solid #e5e5e5; padding: 12px 0; flex-shrink: 0; }
        .sidebar-item { display: flex; align-items: center; gap: 24px; padding: 8px 24px; cursor: pointer; font-size: 14px; font-weight: 500; color: #0f0f0f; transition: background 0.1s; }
        .sidebar-item:hover { background: #f2f2f2; }
        .sidebar-item.active { background: #e5e5e5; }
        .main-content { flex: 1; padding: 24px; overflow-y: auto; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 28px 16px; }
        .video-card { cursor: pointer; transition: transform 0.1s; }
        .video-card:hover { transform: scale(0.99); }
        .thumbnail img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 12px; }
        .video-details { display: flex; margin-top: 12px; gap: 12px; }
        .channel-avatar { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; background: #aaa; flex-shrink: 0; }
        .channel-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .video-title { font-weight: 500; font-size: 14px; line-height: 1.3; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .channel-name, .video-meta { font-size: 12px; color: #606060; }
        .watch-container { max-width: 1300px; margin: 0 auto; }
        .watch-grid { display: flex; gap: 24px; flex-wrap: wrap; }
        .watch-main { flex: 2; min-width: 280px; }
        .watch-sidebar { flex: 1; min-width: 280px; }
        .youtube-player { aspect-ratio: 16/9; width: 100%; border-radius: 12px; overflow: hidden; background: black; position: relative; }
        .youtube-player iframe { width: 100%; height: 100%; border: none; }
        .player-error { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f0f; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; padding: 20px; }
        .player-error i { font-size: 48px; margin-bottom: 16px; }
        .player-error button { background: #ff0000; color: white; border: none; padding: 10px 20px; border-radius: 40px; margin: 8px 4px; cursor: pointer; font-weight: 500; }
        .watch-title { font-size: 20px; font-weight: 600; margin: 16px 0 12px; }
        .watch-actions { display: flex; justify-content: space-between; border-bottom: 1px solid #e5e5e5; padding-bottom: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .channel-info { display: flex; align-items: center; gap: 12px; }
        .subscribe-btn { background: #0f0f0f; color: white; border: none; padding: 8px 16px; border-radius: 40px; font-weight: 500; cursor: pointer; }
        .subscribe-btn.subscribed { background: #f2f2f2; color: #0f0f0f; border: 1px solid #ccc; }
        .like-dislike { display: flex; gap: 8px; background: #f2f2f2; border-radius: 40px; padding: 4px 8px; }
        .like-btn, .dislike-btn { background: none; border: none; font-weight: 500; padding: 6px 12px; border-radius: 40px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .like-btn.active, .dislike-btn.active { background: #e5e5e5; color: #065fd4; }
        .comment-section { margin-top: 24px; }
        .comment { display: flex; gap: 12px; margin: 16px 0; }
        .comment-avatar { width: 36px; height: 36px; border-radius: 50%; background: #ccc; overflow: hidden; }
        .comment-text { background: #f2f2f2; padding: 10px 14px; border-radius: 18px; font-size: 14px; }
        .suggestion-item { display: flex; gap: 10px; margin-bottom: 12px; cursor: pointer; padding: 6px; border-radius: 8px; }
        .suggestion-item:hover { background: #f0f0f0; }
        .suggestion-thumb { width: 168px; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; }
        .suggestion-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .toast-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #323232; color: white; padding: 8px 18px; border-radius: 40px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        .loader { text-align: center; padding: 60px; font-size: 18px; color: #606060; }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { padding: 16px; } .header-center { max-width: 200px; } }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="menu-icon" id="menuMockBtn"><i class="fas fa-bars"></i></div>
        <div class="logo-icon" id="logoBtn"><i class="fab fa-youtube"></i><span>YouTube</span></div>
    </div>
    <div class="header-center">
        <div class="search-form">
            <input type="text" class="search-input" id="searchInput" placeholder="Поиск...">
            <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i></button>
        </div>
    </div>
    <div class="header-right">
        <i class="fas fa-video icon-btn" id="createMockBtn"></i>
        <i class="fas fa-bell icon-btn" id="notifyMockBtn"></i>
        <div class="avatar" id="avatarMock">Ю</div>
    </div>
</div>

<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-item active" data-nav="home"><i class="fas fa-home"></i> <span>Главная</span></div>
        <div class="sidebar-item" data-nav="explore"><i class="fas fa-compass"></i> <span>Explore</span></div>
        <div class="sidebar-item" data-nav="subscriptions"><i class="fas fa-film"></i> <span>Подписки</span></div>
        <div class="sidebar-item" data-nav="library"><i class="fas fa-clock"></i> <span>Библиотека</span></div>
    </div>
    <div class="main-content" id="mainContent">
        <div id="homeContainer" class="video-grid"></div>
        <div id="watchContainer" style="display: none;"></div>
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    // ====================  AIzaSyAVW5CcOl4xoWxB_loSRzOcnXDpcq_Io3Q ====================
    const YOUTUBE_API_KEY = 'AIzaSyAVW5CcOl4xoWxB_loSRzOcnXDpcq_Io3Q';   // ← замените на рабочий ключ
    // ============================================================

    let currentView = 'home';
    let currentVideoId = null;
    let currentChannelName = '';
    let searchQuery = '';
    let videosList = [];
    let loadTimeout = null;

    const homeContainer = document.getElementById('homeContainer');
    const watchContainer = document.getElementById('watchContainer');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const logoBtn = document.getElementById('logoBtn');
    const toastMsgDiv = document.getElementById('toastMsg');

    function showToast(message, isError = false) {
        toastMsgDiv.innerText = message;
        toastMsgDiv.style.backgroundColor = isError ? '#d32f2f' : '#323232';
        toastMsgDiv.style.opacity = '1';
        setTimeout(() => {
            toastMsgDiv.style.opacity = '0';
            toastMsgDiv.style.backgroundColor = '#323232';
        }, 4000);
    }

    function showLoader(container) {
        container.innerHTML = '<div class="loader"><i class="fas fa-spinner fa-pulse"></i> Загрузка видео...</div>';
    }

    // Проверка ключа и запросы
    async function fetchTrendingVideos() {
        const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&maxResults=20&regionCode=US&key=${YOUTUBE_API_KEY}`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || `HTTP ${response.status}`);
            return data.items || [];
        } catch (err) {
            console.error('API ошибка:', err);
            showToast(`Ошибка API: ${err.message}`, true);
            return [];
        }
    }

    async function searchVideos(query) {
        const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=20&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEY}`;
        try {
            const searchResp = await fetch(searchUrl);
            const searchData = await searchResp.json();
            if (!searchResp.ok) throw new Error(searchData.error?.message);
            const videoIds = searchData.items.map(item => item.id.videoId).join(',');
            if (!videoIds) return [];
            const statsUrl = `https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${videoIds}&key=${YOUTUBE_API_KEY}`;
            const statsResp = await fetch(statsUrl);
            const statsData = await statsResp.json();
            const statsMap = {};
            if (statsData.items) statsData.items.forEach(item => { statsMap[item.id] = item.statistics; });
            return searchData.items.map(item => ({
                id: item.id.videoId,
                snippet: item.snippet,
                statistics: statsMap[item.id.videoId] || { viewCount: 0, likeCount: 0 }
            }));
        } catch (err) {
            console.error(err);
            showToast(`Ошибка поиска: ${err.message}`, true);
            return [];
        }
    }

    function formatViewCount(viewCount) {
        if (!viewCount) return '0 просмотров';
        const num = parseInt(viewCount);
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M просмотров';
        if (num >= 1000) return (num / 1000).toFixed(0) + 'K просмотров';
        return num + ' просмотров';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function renderHome() {
        showLoader(homeContainer);
        let items = [];
        if (searchQuery.trim() !== '') {
            items = await searchVideos(searchQuery);
        } else {
            items = await fetchTrendingVideos();
            items = items.map(item => ({
                id: item.id,
                snippet: item.snippet,
                statistics: item.statistics
            }));
        }
        videosList = items;
        if (items.length === 0) {
            homeContainer.innerHTML = `<div class="loader">Ничего не найдено. Попробуйте другой запрос или проверьте API ключ.</div>`;
            return;
        }
        homeContainer.innerHTML = items.map(video => `
            <div class="video-card" data-id="${video.id}">
                <div class="thumbnail"><img src="${video.snippet.thumbnails.medium.url}" loading="lazy"></div>
                <div class="video-details">
                    <div class="channel-avatar"><img src="${video.snippet.thumbnails.default?.url || ''}" onerror="this.src='https://via.placeholder.com/36'"></div>
                    <div class="video-info">
                        <div class="video-title">${escapeHtml(video.snippet.title)}</div>
                        <div class="channel-name">${escapeHtml(video.snippet.channelTitle)}</div>
                        <div class="video-meta">${formatViewCount(video.statistics?.viewCount)} • ${new Date(video.snippet.publishedAt).toLocaleDateString()}</div>
                    </div>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.video-card').forEach(card => {
            card.addEventListener('click', () => {
                const videoId = card.dataset.id;
                const video = items.find(v => v.id === videoId);
                if (video) openWatchView(video);
            });
        });
    }

    function openWatchView(video) {
        currentVideoId = video.id;
        currentChannelName = video.snippet.channelTitle;
        currentView = 'watch';
        homeContainer.style.display = 'none';
        watchContainer.style.display = 'block';
        renderWatch(video);
    }

    function formatNumber(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(0) + 'K';
        return num.toString();
    }

    function handlePlayerError(video, suggestions) {
        // Показываем ошибку в плеере
        const playerContainer = document.getElementById('playerContainer');
        if (!playerContainer) return;

        // Останавливаем таймаут, если был
        if (loadTimeout) clearTimeout(loadTimeout);

        const nextVideo = suggestions.length > 0 ? suggestions[0] : null;
        playerContainer.innerHTML = `
            <div class="player-error">
                <i class="fab fa-youtube"></i>
                <p>⚠️ Видео недоступно для встраивания или удалено.</p>
                <p style="font-size:14px; margin-top:8px;">${escapeHtml(video.snippet.title)}</p>
                <div>
                    <button id="openYoutubeBtn">📺 Открыть на YouTube</button>
                    ${nextVideo ? '<button id="nextVideoBtn" style="background:#3f51b5;">⏩ Следующее видео</button>' : ''}
                    <button id="backHomeBtn" style="background:#606060;">🏠 На главную</button>
                </div>
            </div>
        `;
        document.getElementById('openYoutubeBtn')?.addEventListener('click', () => {
            window.open(`https://www.youtube.com/watch?v=${video.id}`, '_blank');
        });
        if (nextVideo) {
            document.getElementById('nextVideoBtn')?.addEventListener('click', () => {
                openWatchView(nextVideo);
            });
        }
        document.getElementById('backHomeBtn')?.addEventListener('click', () => {
            goHome();
        });
    }

    function renderWatch(video) {
        const suggestions = videosList.filter(v => v.id !== video.id).slice(0, 6);
        const watchHTML = `
            <div class="watch-container">
                <div class="watch-grid">
                    <div class="watch-main">
                        <div class="youtube-player" id="playerContainer">
                            <iframe id="youtubeIframe" src="https://www.youtube.com/embed/${video.id}?autoplay=0&rel=0&enablejsapi=1" allowfullscreen></iframe>
                        </div>
                        <div class="watch-title">${escapeHtml(video.snippet.title)}</div>
                        <div class="watch-actions">
                            <div class="channel-info">
                                <div class="channel-avatar"><img src="${video.snippet.thumbnails.default?.url || ''}" width="36" height="36" style="border-radius:50%" onerror="this.src='https://via.placeholder.com/36'"></div>
                                <div><strong>${escapeHtml(video.snippet.channelTitle)}</strong><div style="font-size:12px;color:#606060">YouTube канал</div></div>
                                <button class="subscribe-btn" id="subscribeBtnAction">Подписаться</button>
                            </div>
                            <div class="like-dislike">
                                <button class="like-btn" id="likeBtn"><i class="fas fa-thumbs-up"></i> ${formatNumber(video.statistics?.likeCount || 0)}</button>
                                <button class="dislike-btn" id="dislikeBtn"><i class="fas fa-thumbs-down"></i> Не нравится</button>
                            </div>
                        </div>
                        <div class="comment-section">
                            <div style="font-weight:500; margin-bottom:12px;">Комментарии (демо)</div>
                            <div class="comment">
                                <div class="comment-avatar"><img src="https://randomuser.me/api/portraits/men/1.jpg" width="36" height="36" style="border-radius:50%"></div>
                                <div class="comment-text">Отличное видео! Спасибо за контент! 🔥</div>
                            </div>
                            <div class="comment">
                                <div class="comment-avatar"><img src="https://randomuser.me/api/portraits/women/6.jpg" width="36" height="36" style="border-radius:50%"></div>
                                <div class="comment-text">YouTube API работает отлично, плеер настоящий!</div>
                            </div>
                        </div>
                    </div>
                    <div class="watch-sidebar">
                        <div style="font-weight:500; margin-bottom:12px;">Рекомендации</div>
                        ${suggestions.map(sug => `
                            <div class="suggestion-item" data-sug-id="${sug.id}">
                                <div class="suggestion-thumb"><img src="${sug.snippet.thumbnails.medium.url}"></div>
                                <div class="suggestion-info">
                                    <div class="suggestion-title">${escapeHtml(sug.snippet.title)}</div>
                                    <div style="font-size:12px; color:#606060">${escapeHtml(sug.snippet.channelTitle)}</div>
                                    <div style="font-size:12px; color:#606060">${formatViewCount(sug.statistics?.viewCount)}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
        watchContainer.innerHTML = watchHTML;

        // Обработка ошибки iframe
        const iframe = document.getElementById('youtubeIframe');
        const playerContainer = document.getElementById('playerContainer');

        // Таймаут на случай, если iframe не грузится (видео запрещено, но onerror не срабатывает)
        if (loadTimeout) clearTimeout(loadTimeout);
        loadTimeout = setTimeout(() => {
            // Если плеер всё ещё имеет iframe и не был заменён
            if (playerContainer && playerContainer.querySelector('iframe')) {
                handlePlayerError(video, suggestions);
            }
        }, 8000);

        if (iframe) {
            iframe.onerror = () => {
                if (loadTimeout) clearTimeout(loadTimeout);
                handlePlayerError(video, suggestions);
            };
            // Попробуем также отловить события загрузки (если удастся)
            iframe.onload = () => {
                if (loadTimeout) clearTimeout(loadTimeout);
                // Успешно загрузилось
            };
        }

        // Подписка (локальная)
        const subBtn = document.getElementById('subscribeBtnAction');
        if (subBtn) {
            subBtn.addEventListener('click', () => {
                if (subBtn.classList.contains('subscribed')) {
                    subBtn.classList.remove('subscribed');
                    subBtn.textContent = 'Подписаться';
                    showToast(`Вы отписались от ${currentChannelName}`);
                } else {
                    subBtn.classList.add('subscribed');
                    subBtn.textContent = '✅ Подписан';
                    showToast(`Вы подписались на ${currentChannelName} (демо)`);
                }
            });
        }

        let liked = false;
        const likeBtn = document.getElementById('likeBtn');
        if (likeBtn) {
            likeBtn.addEventListener('click', () => {
                if (!liked) {
                    liked = true;
                    likeBtn.classList.add('active');
                    const currentLikes = parseInt(likeBtn.innerText.match(/\d+/) || 0);
                    likeBtn.innerHTML = `<i class="fas fa-thumbs-up"></i> ${currentLikes + 1}`;
                    showToast('👍 Лайк сохранён (демо)');
                } else {
                    showToast('Вы уже оценили это видео');
                }
            });
        }

        const dislikeBtn = document.getElementById('dislikeBtn');
        if (dislikeBtn) {
            dislikeBtn.addEventListener('click', () => {
                showToast('👎 Дизлайк (демо)');
                dislikeBtn.classList.add('active');
                setTimeout(() => dislikeBtn.classList.remove('active'), 500);
            });
        }

        document.querySelectorAll('.suggestion-item').forEach(el => {
            const sugId = el.dataset.sugId;
            el.addEventListener('click', () => {
                const sugVideo = videosList.find(v => v.id === sugId);
                if (sugVideo) openWatchView(sugVideo);
            });
        });
    }

    function goHome() {
        if (loadTimeout) clearTimeout(loadTimeout);
        currentView = 'home';
        searchQuery = '';
        searchInput.value = '';
        homeContainer.style.display = 'grid';
        watchContainer.style.display = 'none';
        renderHome();
        document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
        document.querySelector('.sidebar-item[data-nav="home"]').classList.add('active');
    }

    function performSearch() {
        const query = searchInput.value.trim();
        if (query === "") {
            showToast('Введите запрос для поиска на YouTube');
            return;
        }
        searchQuery = query;
        if (currentView === 'watch') goHome();
        else renderHome();
        currentView = 'home';
        homeContainer.style.display = 'grid';
        watchContainer.style.display = 'none';
    }

    function init() {
        if (!YOUTUBE_API_KEY || YOUTUBE_API_KEY === ' AIzaSyAVW5CcOl4xoWxB_loSRzOcnXDpcq_Io3Q') {
            showToast('⚠️ Не указан API ключ YouTube. Вставьте его в переменную YOUTUBE_API_KEY', true);
            homeContainer.innerHTML = '<div class="loader">🔑 Требуется API ключ. Получите его в Google Cloud Console и вставьте в код.</div>';
            return;
        }
        renderHome();
        document.querySelectorAll('.sidebar-item').forEach(item => {
            item.addEventListener('click', () => {
                const nav = item.dataset.nav;
                if (nav === 'home') goHome();
                else showToast(`Раздел "${item.innerText.trim()}" в демо-режиме, данные YouTube настоящие.`);
            });
        });
        document.getElementById('menuMockBtn')?.addEventListener('click', () => showToast('Меню навигации (демо)'));
        document.getElementById('createMockBtn')?.addEventListener('click', () => showToast('Создать видео — функция недоступна в демо'));
        document.getElementById('notifyMockBtn')?.addEventListener('click', () => showToast('Уведомления (демо)'));
        document.getElementById('avatarMock')?.addEventListener('click', () => showToast('Аккаунт: демо-режим'));
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') performSearch(); });
        logoBtn.addEventListener('click', goHome);
    }

    init();
</script>
</body>
</html>
